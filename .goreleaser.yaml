# GoReleaser configuration — https://goreleaser.com
#
# Drives the Release pipeline (.github/workflows/release.yml). Builds the `zebra`
# binary for Linux, macOS, and Windows and attaches them to the GitHub Release.
# Validate locally with: goreleaser release --snapshot --clean
version: 2

project_name: zebra

before:
  hooks:
    - go mod tidy

builds:
  - id: zebra
    main: .
    binary: zebra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  # Publish raw, uncompressed binaries with predictable names
  # (zebra-linux-amd64, zebra-windows-amd64.exe, ...). The npm wrapper's
  # postinstall and the README curl examples download these directly, so the
  # asset names must stay stable.
  - id: zebra
    formats: [binary]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false # publish automatically; the tag is the trigger
  prerelease: auto
