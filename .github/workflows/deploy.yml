# Deploy: publish the released binaries to npm so users can install without Go.
# Run manually after the GitHub Release for the tag exists (see release.yml);
# the npm package's postinstall downloads the binaries from that Release.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.0.1)"
        required: true

permissions:
  contents: read

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        working-directory: npm
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
