# Deploy: manual fallback to (re-)publish the npm package for a given tag.
# The normal path is automatic — npm is published by the Release workflow
# (release.yml) right after GoReleaser. Use this only to re-publish a tag
# without cutting a new one.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        working-directory: npm
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
