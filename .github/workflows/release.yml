# Release: on a version tag (e.g. v0.0.1), run GoReleaser to cross-compile the
# binaries and publish them to a GitHub Release. The release is created as a
# draft (see .goreleaser.yaml) for review before it goes public.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
